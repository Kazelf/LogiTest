name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  logitest-web:
    name: LogiTest shared and web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: logitest-ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: logitest-ai/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Lint dashboard
        run: npm run lint --workspace web

      - name: Build dashboard
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build:web

  logitest-api:
    name: LogiTest FastAPI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: logitest-ai/apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: logitest-ai/apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run API tests
        env:
          PYTHONPATH: .
        run: python -m pytest

  shoplite-server:
    name: ShopLite API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite
          POSTGRES_DB: shoplite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shoplite -d shoplite"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    defaults:
      run:
        working-directory: shoplite/server

    env:
      DATABASE_URL: postgresql://shoplite:shoplite@localhost:5432/shoplite?schema=public
      JWT_SECRET: shoplite-ci-secret
      CLIENT_ORIGIN: http://localhost:5173
      ENVIRONMENT: ci
      ENABLE_ELASTICSEARCH_LOGGING: "false"
      ENABLE_PAYMENT_REGRESSION_BUG: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shoplite/server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:deploy

      - name: Run ShopLite API tests
        run: npm test

  shoplite-client:
    name: ShopLite frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: shoplite/client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shoplite/client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Build ShopLite frontend
        env:
          VITE_API_BASE_URL: http://localhost:4000
        run: npm run build
