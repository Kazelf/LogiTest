services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: logitest_ai
      POSTGRES_USER: logitest
      POSTGRES_PASSWORD: logitest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logitest -d logitest_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      API_PORT: 8000
      DATABASE_URL: postgresql://logitest:logitest@database:5432/logitest_ai
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      database:
        condition: service_healthy

  demo-backend:
    build:
      context: .
      dockerfile: demo-system/Dockerfile
    environment:
      NODE_ENV: demo
      DEMO_BACKEND_PORT: 3001
      ELASTICSEARCH_URL: http://elasticsearch:9200
      DEMO_LOG_INDEX: logitest-demo-logs
      REGRESSION_MODE: "false"
    ports:
      - "3001:3001"
    volumes:
      - ./demo-system:/app/demo-system
      - /app/node_modules
      - /app/demo-system/node_modules
    depends_on:
      elasticsearch:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  elasticsearch_data:
