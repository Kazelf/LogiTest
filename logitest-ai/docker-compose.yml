services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: logitest_ai
      POSTGRES_USER: logitest
      POSTGRES_PASSWORD: logitest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logitest -d logitest_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      API_PORT: 8000
      DATABASE_URL: postgresql://logitest:logitest@database:5432/logitest_ai
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
