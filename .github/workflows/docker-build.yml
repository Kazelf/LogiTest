name: Docker Build Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Compose and image builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate LogiTest compose config
        working-directory: logitest-ai
        run: docker compose config

      - name: Validate ShopLite compose config
        working-directory: shoplite
        run: docker compose config

      - name: Build LogiTest FastAPI image
        working-directory: logitest-ai
        run: docker build -f apps/api/Dockerfile apps/api

      - name: Build LogiTest dashboard image
        working-directory: logitest-ai
        run: docker build -f apps/web/Dockerfile .

      - name: Build ShopLite API image
        working-directory: shoplite
        run: docker build -f server/Dockerfile server

      - name: Build ShopLite frontend image
        working-directory: shoplite
        run: docker build -f client/Dockerfile client
