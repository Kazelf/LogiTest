services:
  - type: web
    name: logitest-demo
    runtime: node
    plan: free
    rootDir: logitest-ai/demo-system
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: REGRESSION_MODE
        value: "false"

  - type: web
    name: logitest-api
    runtime: python
    plan: free
    rootDir: logitest-ai/apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DEMO_BACKEND_URL
        sync: false
      - key: STAGING_API_BASE_URL
        sync: false
      - key: ELASTICSEARCH_URL
        value: ""
      - key: DEMO_LOG_INDEX
        value: logitest-demo-logs
