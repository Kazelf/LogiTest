name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  node-ci:
    name: Node workspace
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: logitest-ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: logitest-ai/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend Linux native bindings
        run: npm install --no-save --no-package-lock --workspace web lightningcss-linux-x64-gnu@1.32.0

      - name: Rebuild frontend native modules
        run: |
          npm rebuild --workspace web
          npm rebuild --workspace web lightningcss || true

      - name: Build shared package
        run: npm run build:shared

      - name: Lint frontend
        run: npm run lint --workspace web

      - name: Build frontend
        run: npm run build:web

      - name: Test demo backend
        run: npm run test:demo

  api-ci:
    name: FastAPI backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: logitest-ai/apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: logitest-ai/apps/api/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: .
        run: pytest
